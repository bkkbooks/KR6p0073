  - {type: variant, offset: 738, length: 174, content: '南無至心歸命禮西方阿彌陀佛

      哀愍覆護我令法種增長此世及後生

      願佛常攝受

      願共諸眾生往生安樂國

      南無至心歸命禮西方極樂世界觀世音菩薩

      願共諸眾生往生安樂國

      南無至心歸命禮西方極樂世界大勢至菩薩

      願共諸眾生往生安樂國

      南無至心歸命禮西方極樂世界諸菩薩清淨大海眾

      願共諸眾生往生安樂國

      普為師僧父母及善知識法界眾生。斷除三障。同得往生阿彌陀佛國。歸命懺悔。

      南無至心歸命禮西方阿彌陀佛', 乙: ''}
